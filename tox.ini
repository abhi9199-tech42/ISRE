[tox]
requires = tox>=4.0
env_list = py310, py311, py312, py313

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    hypothesis>=6.0.0
    pydantic>=2.0.0
    psutil>=5.9.0
commands =
    pytest tests/ --cov=isre --cov-report=term-missing {posargs}

[testenv:lint]
deps = ruff>=0.1.0
commands = ruff check .

[testenv:typecheck]
deps =
    mypy>=1.0.0
    pydantic>=2.0.0
commands = mypy isre/

[testenv:docs]
deps = pydantic>=2.0.0
commands = python -c "print('Documentation generation placeholder')"
